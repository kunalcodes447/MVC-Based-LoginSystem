<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #121212;
        color: #ffffff;
        text-align: center;
    }

    header {
        background-color: #1f1f1f;
        padding: 15px;
        font-size: 22px;
        font-weight: bold;
        color: #00adb5;
        box-shadow: 0 2px 5px rgba(0,0,0,0.5);
    }

    h2 {
        margin-top: 40px;
        color: #eeeeee;
    }

    a {
        display: inline-block;
        margin: 15px;
        padding: 10px 20px;
        text-decoration: none;
        color: #ffffff;
        background-color: #00adb5;
        border-radius: 8px;
        transition: 0.3s;
    }

    a:hover {
        background-color: #007b80;
        transform: scale(1.05);
    }
</style>

</head>

        MVC Web Application
    </header>
