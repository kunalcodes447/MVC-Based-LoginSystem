<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #121212;
        color: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    header {
        width: 100%;
        background-color: #1f1f1f;
        padding: 15px;
        text-align: center;
        font-size: 22px;
        font-weight: bold;
        color: #00adb5;
        box-shadow: 0 2px 5px rgba(0,0,0,0.5);
    }

    form {
        margin-top: 40px;
        background-color: #1e1e1e;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.6);
        width: 320px;
    }

    .form-group {
        display: flex;
        align-items: center;
        margin: 12px 0;
    }

    label {
        width: 100px;
        text-align: right;
        margin-right: 10px;
    }

    input {
        padding: 10px;
        border: none;
        border-radius: 6px;
        outline: none;
        flex: 1;
    }

    input[type="text"],
    input[type="number"],
    input[type="email"],
    input[type="password"] {
        background-color: #2c2c2c;
        color: #fff;
    }

    input[type="submit"] {
        margin-top: 15px;
        width: 100%;
        background-color: #00adb5;
        color: #fff;
        cursor: pointer;
        transition: 0.3s;
    }

    input[type="submit"]:hover {
        background-color: #007b80;
        transform: scale(1.05);
    }
</style>

</head>
<body>

<header>
    MVC Registration Page
</header>

<form action="registerform" method="post">
    
    <div class="form-group">
        <label>Name:</label>
        <input type="text" name="name">
    </div>

    <div class="form-group">
        <label>Age:</label>
        <input type="number" name="age">
    </div>

    <div class="form-group">
        <label>City:</label>
        <input type="text" name ="city">
    </div>

    <div class="form-group">
        <label>Email:</label>
        <input type="email" name="email">
    </div>

    <div class="form-group">
        <label>Password:</label>
        <input type="password" name="password">
    </div>

    <input type="submit" value="Register">

</form>

</body>
</html>
